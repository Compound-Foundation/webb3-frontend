name: Release Production
on:
  workflow_dispatch:
    inputs:
      cid:
        name: cid
        description: IPFS Hash (if blank, pulled from build step)

      signature:
        name: Signature
        description: Signature (if blank, pulled via Seacrest)

      timestamp:
        name: Timestamp
        description: Release timestamp in epoch ms (if blank, generated at release time)

      deployer:
        name: Deployer
        description: Deployer address (if blank, pulled via Seacrest)
jobs:
  build:
    name: Release Branch
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '25'
          corepack: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install

      - name: Download artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow: build.yaml
          workflow_conclusion: success
          branch: main
          name: .release
        if: github.event.inputs.cid == ''

      - name: Seacrest
        uses: torreyatcitty/seacrest@57db4c6e700afc442655ab054b46eb053a9d799d
        with:
          wallet_connect_project_id: ${{secrets.VITE_V3_WALLET_CONNECT_PROJECT_ID}}
          requested_network: mainnet
        if: github.event.inputs.signature == ''

      - name: Push IPFS Release
        run: node scripts/release.js
        env:
          ETHEREUM_NODE: http://localhost:8585
          CID: '${{github.event.inputs.cid}}'
          SIGNATURE: '${{ github.event.inputs.signature }}'
          TIMESTAMP: '${{ github.event.inputs.timestamp }}'
          DEPLOYER: '${{ github.event.inputs.deployer }}'
